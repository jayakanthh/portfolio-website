<style>
  /* ===== Splash (HTML-only, runs before React/Babel are ready) ===== */
  html, body { background: #07090d; }
  #splash {
    position: fixed; inset: 0; z-index: 100000;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 800px at 50% 50%, #0e1219 0%, #07090d 60%, #050608 100%);
    transition: opacity .35s ease, visibility .35s ease;
    color: #ece4d0;
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  body.booted #splash { opacity: 0; visibility: hidden; pointer-events: none; }

  /* ===== Terminal boot log ===== */
  #splash { align-items: flex-start; justify-content: flex-start; }
  #splash .boot {
    width: min(720px, 92vw);
    margin: 0;
    padding: 28px 0 0 32px;
  }
  #splash .boot-log {
    margin: 0;
    font-size: 13.5px;
    line-height: 1.75;
    font-variant-ligatures: none;
  }
  #splash .boot-line {
    display: block;
    white-space: pre-wrap;
    word-break: break-word;
    animation: bootIn .16s ease both;
  }
  #splash .boot-line.sp { height: 0.9em; }
  #splash .boot-line.head { color: #ece4d0; letter-spacing: 0.02em; margin-bottom: 2px; }
  #splash .boot-line.head .v { color: #3eff9a; }
  #splash .b-br  { color: #ece4d055; }
  #splash .b-ok  { color: #3eff9a; text-shadow: 0 0 10px #3eff9a55; }
  #splash .b-warn{ color: #ffcf6b; }
  #splash .b-k   { color: #ece4d044; }
  #splash .b-msg { color: #ece4d0cc; }
  #splash .b-run { color: #3eff9a; }
  /* animated dots on the final "starting session" line */
  #splash .b-run::after {
    content: "";
    animation: spDots 1s steps(4, end) infinite;
  }
  /* blinking block cursor parked at the end of the log */
  #splash .boot-caret {
    display: inline-block;
    width: 8px; height: 15px;
    margin-left: 2px;
    background: #3eff9a;
    vertical-align: -2px;
    box-shadow: 0 0 10px #3eff9a66;
    animation: spBlink 1s steps(1) infinite;
  }
  #splash .boot-skip {
    margin-top: 22px;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #ece4d038;
  }

  @keyframes bootIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  @keyframes spBlink { 50% { opacity: 0; } }
  @keyframes spDots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }

  /* reduced-motion: no per-line slide, no shadows */
  body.reduced-motion #splash .boot-line { animation: none; }
  body.reduced-motion #splash .b-ok { text-shadow: none; }
</style>

<script>
  // ===== Terminal boot sequence (vanilla — runs before React/Babel) =====
  (function () {
    var sp  = document.getElementById("splash");
    var log = document.getElementById("boot-log");
    if (!sp || !log) { window.__bootDone = true; return; }

    var reduced = document.body.classList.contains("reduced-motion");
    var fast    = reduced;

    // boot log, themed to the actual stack
    var LINES = [
      { head: true, html: 'jk-os <span class="v">24.05 LTS</span>  \u00b7  tty1' },
      { sp: true },
      { k: "[    0.000000]", t: "booting jk-os \u2026 cold start" },
      { k: "[    0.214887]", t: "probing hardware \u2014 cpu, gpu, entropy" },
      { ok: true, t: "Mounted /dev/portfolio" },
      { ok: true, t: "Reached target Local File Systems" },
      { ok: true, t: "Started Hardware RNG \u2014 entropy gathered" },
      { ok: true, t: "Loaded module react@18.3.1" },
      { ok: true, t: "Loaded module babel-standalone@7" },
      { ok: true, t: "Started GPU compositor  (motion-blur: on)" },
      { ok: true, t: "Started cursor daemon" },
      { ok: true, t: "Mounted /home/jayakanth" },
      { ok: true, t: "Reached target Graphical Interface" },
      { sp: true },
      { login: true, t: "jk login: jayakanth" },
      { run: true, t: "starting portfolio session" },
    ];

    function render(ln) {
      var el = document.createElement("div");
      el.className = "boot-line" + (ln.head ? " head" : "") + (ln.sp ? " sp" : "");
      if (ln.sp) { el.innerHTML = "&nbsp;"; }
      else if (ln.head) { el.innerHTML = ln.html; }
      else {
        var s = "";
        if (ln.ok)      s += '<span class="b-br">[<span class="b-ok">  OK  </span>]</span> ';
        else if (ln.k)  s += '<span class="b-k">' + ln.k + "</span> ";
        else if (ln.login) s += '<span class="b-msg">';
        s += '<span class="' + (ln.run ? "b-run" : "b-msg") + '">' + (ln.t || "") + "</span>";
        if (ln.login) s += "</span>";
        el.innerHTML = s;
      }
      log.appendChild(el);
    }

    var caret = document.createElement("span");
    caret.className = "boot-caret";

    var done = false;
    function finish() {
      if (done) return;
      done = true;
      window.__bootDone = true;
      if (window.maybeHideSplash) window.maybeHideSplash();
    }

    function skip() {
      // dump any remaining lines instantly, then finish
      while (idx < LINES.length) { render(LINES[idx++]); }
      finish();
    }

    var idx = 0;
    function step() {
      if (idx >= LINES.length) {
        log.appendChild(caret);
        setTimeout(finish, fast ? 120 : 620);
        return;
      }
      var ln = LINES[idx++];
      render(ln);
      var d;
      if (fast)            d = 14;
      else if (ln.head)    d = 240;
      else if (ln.sp)      d = 60;
      else if (ln.login)   d = 360;
      else if (ln.run)     d = 120;
      else                 d = 78 + Math.random() * 64; // jittered like a real log
      setTimeout(step, d);
    }

    // skip on any key / click / touch
    var onSkip = function () {
      window.removeEventListener("keydown", onSkip);
      sp.removeEventListener("click", onSkip);
      sp.removeEventListener("touchstart", onSkip);
      skip();
    };
    window.addEventListener("keydown", onSkip);
    sp.addEventListener("click", onSkip);
    sp.addEventListener("touchstart", onSkip, { passive: true });

    step();
  })();
</script>

const Navbar = () => {
  const [active, setActive] = React.useState("about");
  const [visible, setVisible] = React.useState(false);

  React.useEffect(() => {
    const check = () => {
      const el = document.getElementById("about");
      setVisible(!!el && el.getBoundingClientRect().top <= window.innerHeight * 0.6);
    };
    window.addEventListener("scroll", check, { passive: true });
    check();
    return () => window.removeEventListener("scroll", check);
  }, []);

  React.useEffect(() => {
    const ids = ["about", "projects", "stack", "experience", "certifications", "contact"];
    let ticking = false;
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const y = window.scrollY + window.innerHeight * 0.35;
        let current = ids[0];
        for (const id of ids) {
          const el = document.getElementById(id);
          if (el && el.offsetTop <= y) current = id;

        setActive(current);
        ticking = false;
      });
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

<script type="text/babel">
/* Cursor */
const Cursor = () => {
  const innerRef = React.useRef(null);
  const outerRef = React.useRef(null);

  React.useEffect(() => {
    const inner = innerRef.current;
    const outer = outerRef.current;
    if (!inner || !outer) return;

    const isTouch = window.matchMedia("(hover: none), (pointer: coarse)").matches;
    if (isTouch) {
      inner.style.display = "none";
      outer.style.display = "none";
      return;
    }

    const isClickable = (el) => {
      while (el && el !== document.body) {
        const tag = el.tagName;
        if (tag === "A" || tag === "BUTTON" || tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return true;
        if (el.classList && (
          el.classList.contains("tech-icon") ||
          el.classList.contains("btn") ||
          el.classList.contains("chip") ||
          el.classList.contains("project-card") ||
          el.classList.contains("about-card") ||
          el.classList.contains("orbit-tag") ||
          el.classList.contains("orbit-cat") ||
          el.classList.contains("hero-btn") ||
          el.classList.contains("pr-item") ||
          el.classList.contains("tl-card") ||
          el.classList.contains("tlc-chip") ||
          el.classList.contains("to-top")
        )) return true;
        el = el.parentElement;
      }
      return false;
    };

    let revealed = false;
    let wasHover = false;

    const onMove = (e) => {
      const x = e.clientX;
      const y = e.clientY;
      inner.style.left = x + "px";
      inner.style.top  = y + "px";
      outer.animate(
        { left: x + "px", top: y + "px" },
        { duration: 500, fill: "forwards" }
      );
      if (!revealed) {
        revealed = true;
        document.body.classList.add("cursor-shown");
      }
      const h = isClickable(e.target);
      if (h !== wasHover) {
        inner.classList.toggle("hover", h);
        outer.classList.toggle("hover", h);
        wasHover = h;
      }
    };
    const onLeaveWindow = () => {
      revealed = false;
      document.body.classList.remove("cursor-shown");
    };
    window.addEventListener("mousemove", onMove, { passive: true });
    document.addEventListener("mouseleave", onLeaveWindow);

    return () => {
      window.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseleave", onLeaveWindow);
    };
  }, []);

  return (
    <>
      <div ref={outerRef} className="cursor-outer" aria-hidden="true" />
      <div ref={innerRef} className="cursor-inner" aria-hidden="true" />
    </>
  );
};

window.Cursor = Cursor;
</script>

<script type="text/babel">
/* Hero */
const TERMINAL_LINES = [
  { kind: "prompt", cmd: "whoami", out: ["jayakanth Kamisetti"] },
  { kind: "prompt", cmd: "cat role.txt", out: ["CSIT Student"] },
  { kind: "prompt", cmd: "cat wins.txt", out: ["3x hackathon winner · AWS certified · Automation Anywhere certified"] },
  { kind: "prompt", cmd: "ls ~/skills", out: null, chips: true },
  { kind: "prompt", cmd: "./now --status", out: ["Working on openclaw"] },
  { kind: "prompt", cmd: "_", out: null, blink: true },
];

const SKILL_CHIPS = ["python", "react", "java", "js/ts", "sql", "spark", "aws", "docker"];

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

const Hero = () => {
  const [typed, setTyped] = React.useState([]);

  React.useEffect(() => {
    let cancelled = false;
    const run = async () => {
      for (let i = 0; i < TERMINAL_LINES.length; i++) {
        if (cancelled) return;
        const line = TERMINAL_LINES[i];
        for (let c = 0; c <= line.cmd.length; c++) {
          if (cancelled) return;
          setTyped((prev) => {
            const next = [...prev];
            next[i] = { typedCmd: line.cmd.slice(0, c), out: [], showChips: false };
            return next;
          });
          await sleep(30 + Math.random() * 40);
        }
        await sleep(220);
        if (line.out) {
          for (let oi = 0; oi < line.out.length; oi++) {
            if (cancelled) return;
            setTyped((prev) => {
              const next = [...prev];
              next[i] = { ...next[i], out: [...(next[i].out || []), line.out[oi]] };
              return next;
            });
            await sleep(120);
          }
        }
        if (line.chips) {
          if (cancelled) return;
          setTyped((prev) => {
            const next = [...prev];
            next[i] = { ...next[i], showChips: true };
            return next;
          });
          await sleep(420);
        }
        await sleep(160);
      }
    };
    run();
    return () => { cancelled = true; };
  }, []);

  return (
    <section id="home" className="hero">
      <div className="hero-particles">
        {Array.from({length: 18}).map((_, i) => (
          <span key={i} style={{
            left: `${(i * 53) % 100}%`,
            top: `${(i * 37) % 100}%`,
            animationDelay: `${i * 0.6}s`,
            animationDuration: `${10 + (i % 6)}s`,
          }} />
        ))}
      </div>
      <div className="hero-split">
        <div className="hero-left">
          <h1 className="hero-title">
            <span className="ht-line">Hello There! I'm</span>
            <span className="ht-line ht-green">
              Jayakanth Kamisetti<span className="ht-caret" aria-hidden="true" />
            </span>
          </h1>
          <p className="hero-body">
            Final year Computer Science student who builds things
            <span className="hero-body-em"> end to end </span>  
            from the interface down to the infrastructure. I go deep on whatever I'm working on.
          </p>
          <div className="hero-cta">
            <a href="#projects" className="hero-btn primary">
              <span>explore projects</span>
              <span className="hb-arrow">→</span>
            </a>
            <a href="#about" className="hero-btn">introduction</a>
          </div>
        </div>
        <div className="hero-right">
          <div className="terminal glass">
            <div className="term-bar">
              <span className="tl tl-r" />
              <span className="tl tl-y" />
              <span className="tl tl-g" />
              <span className="term-title">terminal://jayakanth</span>
              <span className="term-meta">86×24</span>
            </div>
            <div className="term-body">
              {TERMINAL_LINES.map((line, i) => {
                const t = typed[i];
                if (!t) return null;
                return (
                  <div key={i} className="term-line">
                    <div className="term-cmd">
                      <span className="term-prompt">jay@home <span className="arrow">❯</span></span>
                      <span className="term-text">{t.typedCmd}{i === typed.length - 1 && line.blink ? <span className="caret" /> : null}</span>
                    </div>
                    {t.out && t.out.length > 0 && (
                      <div className="term-out">
                        {t.out.map((o, oi) => (
                          <div key={oi} className={o.startsWith("//") ? "comment" : ""}>{o}</div>
                        ))}
                      </div>
                    )}
                    {t.showChips && (
                      <div className="term-chips">
                        {SKILL_CHIPS.map((s, si) => (
                          <span key={si} className="term-chip" style={{ animationDelay: `${si * 60}ms` }}>{s}</span>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
      <div className="hero-scroll" aria-hidden="true">

  const ROTATE_MS = 3000;
  const startRef = React.useRef(performance.now());
  const barRef = React.useRef(null);

  React.useEffect(() => {
    if (paused) return;
    startRef.current = performance.now();
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - startRef.current) / ROTATE_MS);
      if (barRef.current) {
        barRef.current.style.transform = `scaleX(${t.toFixed(3)})`;
      }
      if (t >= 1) {
        setActive((a) => (a + 1) % PROJECTS.length);
        startRef.current = performance.now();
        if (barRef.current) barRef.current.style.transform = "scaleX(0)";
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [paused, active]);

  const pick = (i) => {
    setActive(i);
    startRef.current = performance.now();
    if (barRef.current) barRef.current.style.transform = "scaleX(0)";

                )}

            ))}
          </ul>
          <div className="pr-foot">
            <span className={`pr-state ${paused ? "paused" : ""}`}>

    <CertImage c={c} />
    <div className="cv3-body">
      <div className="cv3-meta-top">
        <span className="cv3-org">{c.issuer}</span>
        <span className="cv3-meta-sep" />
        <span className="cv3-date">
          <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8"  y1="2" x2="8"  y2="6" />
            <line x1="3"  y1="10" x2="21" y2="10" />
          </svg>
          {c.date}
        </span>
      </div>
      <h3 className="cv3-title">{c.title}</h3>
      {c.verify && (
        <a className="cv3-verify" href={c.verify} target="_blank" rel="noopener noreferrer" aria-label={`Verify ${c.title} credential`} tabIndex={layer === "exit" ? -1 : 0}>
          <span className="cv3-verify-dot" />
          <span>verify credential</span>
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <path d="M7 17L17 7" /><path d="M8 7h9v9" />
          </svg>
        </a>
      )}
    </div>
  </article>
));

const Certifications = () => {
  const [i, setI] = React.useState(0);
  const [exiting, setExiting] = React.useState(null);
  const [dir, setDir] = React.useState(1);
  const [paused, setPaused] = React.useState(false);
  const [inView, setInView] = React.useState(false);
  const total = CERTS_V3.length;
  const c = CERTS_V3[i];
  const exitTimer = React.useRef(null);
  const iRef = React.useRef(0);
  React.useEffect(() => { iRef.current = i; }, [i]);

  const change = React.useCallback((next, d) => {
    const cur = iRef.current;
    if (next === cur) return;
    setDir(d);
    setExiting({ idx: cur, dir: d });
    clearTimeout(exitTimer.current);
    exitTimer.current = setTimeout(() => setExiting(null), SLIDE_MS);
    setI(next);
  }, []);

  const go = React.useCallback((delta) => {
    const cur = iRef.current;
    change((cur + delta + total) % total, delta >= 0 ? 1 : -1);
  }, [total, change]);

  const jumpTo = React.useCallback((j) => {
    const cur = iRef.current;
    if (j !== cur) change(j, j > cur ? 1 : -1);
  }, [change]);

  React.useEffect(() => () => clearTimeout(exitTimer.current), []);

  const autoOK = inView && !paused && !window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  React.useEffect(() => {
    if (!autoOK) return;
    const t = setTimeout(() => go(1), AUTO_MS);
    return () => clearTimeout(t);
  }, [autoOK, i, go]);

  React.useEffect(() => {
    const sec = document.getElementById("certifications");
    if (!sec) return;
    const io = new IntersectionObserver(([e]) => setInView(e.isIntersecting), { threshold: 0.4 });
    io.observe(sec);
    return () => io.disconnect();
  }, []);

  React.useEffect(() => {
    if (!inView) return;
    const onKey = (e) => {
      if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
      else if (e.key === "ArrowLeft") { e.preventDefault(); go(-1); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [inView, go]);

  const touch = React.useRef({ x: 0, active: false });
  const onTStart = (e) => { touch.current = { x: e.touches[0].clientX, active: true }; setPaused(true); };
  const onTEnd = (e) => {
    if (!touch.current.active) return;
    const dx = e.changedTouches[0].clientX - touch.current.x;
    touch.current.active = false;
    setPaused(false);
    if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
  };

  return (
    <section id="certifications" className="certs-v3">
      <div className="eyebrow"><span className="dot" />05 / Certifications</div>
      <div className="cv3-head">
        <h2 className="section-title">Certifications, <em>verified</em>.</h2>
        <div className="cv3-counter">
          <span className="cv3-counter-n">{(i + 1).toString().padStart(2, "0")}</span>
          <span className="cv3-counter-sep">/</span>
          <span className="cv3-counter-t">{total.toString().padStart(2, "0")}</span>
        </div>
      </div>
      <div className="cv3-stage" onTouchStart={onTStart} onTouchEnd={onTEnd} onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
        <button className="cv3-nav prev" onClick={() => go(-1)} aria-label="Previous certificate">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
        </button>
        <div className="cv3-viewport">
          {exiting && <CertCard key={`exit-${exiting.idx}`} c={CERTS_V3[exiting.idx]} layer="exit" dir={exiting.dir} />}
          <CertCard key={`enter-${i}`} c={c} layer="enter" dir={dir} />
        </div>
        <button className="cv3-nav next" onClick={() => go(1)} aria-label="Next certificate">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6" /></svg>
        </button>
      </div>
      <div className="cv3-dots" role="tablist" aria-label="Certificate slides" onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
        {CERTS_V3.map((cc, j) => (
          <button key={cc.title} className={`cv3-dot ${j === i ? "on" : ""}`} onClick={() => jumpTo(j)} role="tab" aria-selected={j === i} aria-label={`Show ${cc.title}`}>
            <span className="cv3-dot-line" />
            {j === i && <span className="cv3-dot-fill" data-run={autoOK ? "1" : "0"} style={{ animationDuration: `${AUTO_MS}ms` }} key={`fill-${i}-${autoOK}`} />}
          </button>
        ))}
      </div>
      <div className="cv3-hint">// auto-advancing · hover to pause · ← → arrow keys · swipe</div>
    </section>
  );
};

window.Certifications = Certifications;
</script>

<script>
/* Motion utilities */
(function () {
  document.documentElement.style.scrollBehavior = "smooth";

  const reveal = (root = document) => {
    const els = root.querySelectorAll(
      ".section-title, .eyebrow, .about-body p, .about-stats, .about .pic, .project-card, .timeline-item, .contact-card, .hero-h, .hero-sub, .hero-actions, .tech-stage, [data-split]"
    );
    els.forEach((el) => {
      if (el.dataset.revealReady) return;
      el.dataset.revealReady = "1";
      el.classList.add("reveal");
    });
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) { e.target.classList.add("revealed"); io.unobserve(e.target); }
        });
      },
      { threshold: 0.12, rootMargin: "0px 0px -60px 0px" }
    );
    els.forEach((el) => io.observe(el));
  };

  const magnetize = () => {
    const els = document.querySelectorAll(".btn, .nav-pill a, .chip, .project-card .actions a");
    els.forEach((el) => {
      if (el.dataset.magReady) return;
      el.dataset.magReady = "1";
      let raf;
      const onMove = (e) => {
        const r = el.getBoundingClientRect();
        const dx = (e.clientX - (r.left + r.width / 2)) * 0.25;
        const dy = (e.clientY - (r.top + r.height / 2)) * 0.25;
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => { el.style.transform = `translate(${dx}px, ${dy}px)`; });
      };
      const onLeave = () => { cancelAnimationFrame(raf); el.style.transform = ""; };
      el.addEventListener("mousemove", onMove);
      el.addEventListener("mouseleave", onLeave);
    });
  };

  const tilt = () => {
    const els = document.querySelectorAll(".project-card, .about .pic, .contact-card, .tw3-tile");
    els.forEach((el) => {
      if (el.dataset.tiltReady) return;
      el.dataset.tiltReady = "1";
      const tile = el.classList.contains("tw3-tile");
      const amp = tile ? 12 : 5;
      let raf;
      const onMove = (e) => {
        const r = el.getBoundingClientRect();
        const px = (e.clientX - r.left) / r.width - 0.5;
        const py = (e.clientY - r.top) / r.height - 0.5;
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => {
          const rx = tile ? -py * amp : -py * 4;
          const ry = tile ? px * amp : px * 5;
          const lift = tile ? " translateY(-4px)" : "";
          el.style.transform = `perspective(1200px) rotateX(${rx}deg) rotateY(${ry}deg)${lift} translateZ(0)`;
          el.style.setProperty("--mx", `${(px + 0.5) * 100}%`);
          el.style.setProperty("--my", `${(py + 0.5) * 100}%`);
        });
      };
      const onLeave = () => { cancelAnimationFrame(raf); el.style.transform = ""; };
      el.addEventListener("mousemove", onMove);
      el.addEventListener("mouseleave", onLeave);
    });
  };

  const parallax = () => {
    const layers = document.querySelectorAll("[data-parallax]");
    if (!layers.length) return;
    let raf = null;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        const y = window.scrollY;
        layers.forEach((l) => { const speed = parseFloat(l.dataset.parallax) || 0.2; l.style.transform = `translateY(${y * speed}px)`; });
        raf = null;
      });
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
  };

  const splitText = () => {
    document.querySelectorAll("[data-split]").forEach((el) => {
      if (el.dataset.splitDone) return;
      el.dataset.splitDone = "1";
      const text = el.textContent;
      el.textContent = "";
      [...text].forEach((ch, i) => {
        const span = document.createElement("span");
        span.className = "ch";
        span.textContent = ch === " " ? " " : ch;
        span.style.transitionDelay = `${i * 22}ms`;
        el.appendChild(span);
      });
    });
  };

  const runAll = () => { splitText(); reveal(); magnetize(); tilt(); };

  if (document.readyState === "complete" || document.readyState === "interactive") {
    setTimeout(runAll, 100);
  } else {
    document.addEventListener("DOMContentLoaded", runAll);
  }
  setTimeout(runAll, 600);
  setTimeout(runAll, 1500);
  setTimeout(runAll, 3000);
  parallax();

  // re-attach tilt/magnetize whenever React swaps in new DOM nodes (e.g. project card switch)
  let debounce;
  new MutationObserver(() => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { tilt(); magnetize(); }, 50);
  }).observe(document.body, { childList: true, subtree: true });
})();
</script>

<script type="text/babel">
const App = () => (
  <>
    <Cursor />
    <div className="nebula"><div className="blob b1" /><div className="blob b2" /><div className="blob b3" /><div className="blob b4" /></div>
    <div className="stars" />
    <Navbar />
    <main className="shell">
      <Hero />
      <About />
      <Projects />
      <TechStack />
      <Experience />
      <Certifications />
      <Contact />
    </main>
    <FooterMini />
    <ToTop />
    <div className="crt-scan" />
    <div className="crt-vignette" />
  </>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

// The splash hides only once BOTH the boot log has finished AND React has
// painted — so we never cut the boot sequence short, and never reveal an
// unpainted page. Either side calls maybeHideSplash(); the last one wins.
window.maybeHideSplash = function () {
  if (!window.__bootDone || !window.__reactPainted) return;
  document.body.classList.add("booted");
  setTimeout(function () {
    var sp = document.getElementById("splash");
    if (sp) sp.remove();
  }, 420);
};

requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    window.__reactPainted = true;
    window.maybeHideSplash();
  });
});

// Safety net: never let the splash hang if something stalls.
setTimeout(function () {
  window.__bootDone = true;
  window.__reactPainted = true;
  window.maybeHideSplash();
}, 6000);
</script>
